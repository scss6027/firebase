---
layout: null
---
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCSS6027 MASTER CONSOLE</title>
  <link rel="stylesheet" href="https://scss6027.github.io/main/style-public.css">

  <script>
    // SECURITY GATE
    if (!sessionStorage.getItem("consoleAuth")) { window.location.href = "login.html"; }
    
    // DATA SOURCE
    let tickets = {{ site.data.tickets | jsonify }};
    const GITHUB_API_URL = "https://api.github.com/repos/SCSS6027/FIREBASE/contents/_data/tickets.json";
    const userEmail = sessionStorage.getItem("consoleAuth");
  </script>

  <style>
    body { background: #f4f7f6; font-family: sans-serif; padding: 20px; }
    .container { max-width: 1100px; margin: auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #2b00fe; padding-bottom: 15px; }
    
    /* Panel Styles */
    .panel { display: none; background: #f8f9fa; border: 1px solid #2b00fe; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
    .btn { padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    .btn-main { background: #2b00fe; color: white; }
    .btn-delete { background: #d9534f; color: white; }
    .btn-create { background: #28a745; color: white; }
    
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
    tr:hover { background: #f1f1f1; }
    
    input, textarea, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
    #msg { padding: 10px; margin: 10px 0; border-radius: 4px; display: none; font-weight: bold; }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>TICKET_MASTER_CONSOLE</h1>
    <div>
      <button class="btn btn-create" onclick="openPanel('createPanel')">+ Create New Ticket</button>
      <button class="btn btn-delete" onclick="logout()">Logout</button>
    </div>
  </header>

  <div id="msg"></div>

  <!-- 1. CREATE PANEL -->
  <div id="createPanel" class="panel">
    <h3>[CREATE] New System Entry</h3>
    <input type="text" id="new-name" placeholder="Contact Name">
    <input type="text" id="new-subject" placeholder="Subject">
    <textarea id="new-desc" rows="3" placeholder="Description"></textarea>
    <button class="btn btn-create" onclick="executeCommit('CREATE')">Commit New Ticket</button>
    <button class="btn" onclick="closePanels()">Cancel</button>
  </div>

  <!-- 2. EDIT PANEL -->
  <div id="editPanel" class="panel">
    <h3>[MODIFY] Ticket #<span id="edit-id"></span></h3>
    <select id="edit-status">
        <option value="Open">Open</option>
        <option value="Pending">Pending</option>
        <option value="Closed">Closed</option>
    </select>
    <textarea id="edit-desc" rows="3"></textarea>
    <button class="btn btn-main" onclick="executeCommit('UPDATE')">Commit Changes</button>
    <button class="btn btn-delete" onclick="executeCommit('DELETE')">Delete Ticket</button>
    <button class="btn" onclick="closePanels()">Cancel</button>
  </div>

  <!-- 3. DATA TABLE -->
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Subject</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>
</div>

<script>
  let activeIdx = null;
  const pat = localStorage.getItem('GITHUB_PAT') || sessionStorage.getItem('temp_pat');

  function render() {
    const body = document.getElementById('table-body');
    body.innerHTML = '';
    tickets.forEach((t, i) => {
      body.innerHTML += `<tr>
        <td>${t.TicketNumber}</td>
        <td>${t.Name}</td>
        <td>${t.Description.substring(0,40)}...</td>
        <td><strong>${t.Status}</strong></td>
        <td><button class="btn btn-main" onclick="openEdit(${i})">Manage</button></td>
      </tr>`;
    });
  }

  function openPanel(id) {
    closePanels();
    document.getElementById(id).style.display = 'block';
  }

  function closePanels() {
    document.getElementById('createPanel').style.display = 'none';
    document.getElementById('editPanel').style.display = 'none';
  }

  function openEdit(i) {
    activeIdx = i;
    document.getElementById('edit-id').textContent = tickets[i].TicketNumber;
    document.getElementById('edit-desc').value = tickets[i].Description;
    document.getElementById('edit-status').value = tickets[i].Status;
    openPanel('editPanel');
  }

  async function executeCommit(action) {
    const msg = document.getElementById('msg');
    if (!pat) { alert("Missing GitHub Token!"); return; }

    msg.style.display = 'block';
    msg.style.background = '#fff3cd';
    msg.textContent = `Initializing GitHub API: ${action}...`;

    try {
      // Step A: Get latest SHA from GitHub
      const res = await fetch(GITHUB_API_URL, { headers: { "Authorization": `token ${pat}` } });
      const fileData = await res.json();
      const sha = fileData.sha;

      // Step B: Logic for Create / Update / Delete
      if (action === 'CREATE') {
          const nextId = tickets.length > 0 ? Math.max(...tickets.map(t => t.TicketNumber)) + 1 : 1;
          tickets.push({
              TicketNumber: nextId,
              Name: document.getElementById('new-name').value,
              EmailAddress: userEmail,
              Description: document.getElementById('new-desc').value,
              Status: "Open",
              Created: new Date().toISOString(),
              Updated: new Date().toISOString()
          });
      } else if (action === 'UPDATE') {
          tickets[activeIdx].Description = document.getElementById('edit-desc').value;
          tickets[activeIdx].Status = document.getElementById('edit-status').value;
          tickets[activeIdx].Updated = new Date().toISOString();
      } else if (action === 'DELETE') {
          if (!confirm("Are you sure? This is permanent.")) return;
          tickets.splice(activeIdx, 1);
      }

      // Step C: Push back to GitHub
      const content = btoa(unescape(encodeURIComponent(JSON.stringify(tickets, null, 2))));
      const putRes = await fetch(GITHUB_API_URL, {
          method: "PUT",
          headers: { "Authorization": `token ${pat}`, "Content-Type": "application/json" },
          body: JSON.stringify({ message: `${action} Ticket via Master Console`, content: content, sha: sha })
      });

      if (putRes.ok) {
          msg.style.background = '#d4edda';
          msg.textContent = `SUCCESS: Database updated. Action: ${action}`;
          setTimeout(() => { location.reload(); }, 1500);
      }
    } catch (err) {
      msg.style.background = '#f8d7da';
      msg.textContent = "Error: " + err.message;
    }
  }

  function logout() { sessionStorage.clear(); window.location.href = "login.html"; }
  render();
</script>
</body>
</html>
