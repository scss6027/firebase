---
layout: null
---
<!DOCTYPE html>
<html>
<head>
    <title>{{ page.title }}</title>
    <style>
        /* RETRO TERMINAL CSS */
        body {
            background-color: #050a05;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            margin: 0; padding: 20px;
            overflow: hidden;
            text-shadow: 0 0 5px #00ff41;
        }

        /* CRT SCANLINE EFFECT */
        body::before {
            content: " ";
            position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 10;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        #output {
            height: 90vh;
            overflow-y: auto;
            white-space: pre-wrap;
            margin-bottom: 10px;
        }

        .prompt-line { display: flex; align-items: center; }
        .prompt { margin-right: 10px; font-weight: bold; }
        input {
            background: transparent; border: none; color: #00ff41;
            font-family: inherit; font-size: inherit; outline: none; flex: 1;
            text-shadow: 0 0 5px #00ff41;
        }

        /* FLICKER ANIMATION */
        @keyframes flicker {
            0% { opacity: 0.97; } 5% { opacity: 0.95; } 10% { opacity: 0.9; }
            100% { opacity: 1; }
        }
        #output { animation: flicker 0.1s infinite; }
    </style>
</head>
<body>

    <div id="output">{{ page.boot_message }}
{{ content }}</div>

    <div class="prompt-line">
        <span class="prompt">SCSS6027_ROOT ></span>
        <input type="text" id="command-input" autofocus>
    </div>

<script>
    const input = document.getElementById('command-input');
    const output = document.getElementById('output');
    
    // 1. Fetch the ARRAY of admin emails from Jekyll's _data/auth.json
    const AUTHORIZED_LIST = {{ site.data.auth.admins | jsonify }};
    
    // 2. Fetch the database (Works for either 'tickets' or 'subscribers')
    const dataItems = {{ site.data.tickets | default: site.data.subscribers | jsonify }};

    /**
     * GATEKEEPER: Identity Verification
     * To be triggered by Google OAuth login next week.
     */
    function verifyAccess(userEmail) {
        if (AUTHORIZED_LIST.includes(userEmail)) {
            bootSystem(userEmail);
        } else {
            // LOCKOUT SEQUENCE
            output.innerHTML = "CRITICAL ERROR: UNAUTHORIZED ACCESS ATTEMPT.";
            output.innerHTML += `\nUSER [${userEmail}] IS NOT IN THE ADMIN_LIST.`;
            output.style.color = "#ff3333"; // Red Alert
            input.disabled = true;
        }
    }

    /**
     * INITIALIZE: System Boot
     */
    function bootSystem(user) {
        printLine(`IDENTITY VERIFIED: ${user}`);
        printLine("SESSION ESTABLISHED. ACCESS GRANTED.");
        printLine("--------------------------------------");
        printLine("SYSTEM READY. TYPE 'HELP' FOR COMMANDS.");
        input.disabled = false;
        input.focus();
    }

    /**
     * LOGIC: Command Processor
     */
    function handleCommand(cmd) {
        printLine(`\nSCSS6027_ROOT > ${cmd}`);

        if (cmd === 'help') {
            printLine("AVAILABLE COMMANDS:");
            printLine("- LS: List all database records");
            printLine("- CLEAR: Wipe terminal screen");
            printLine("- HELP: Show this manual");
        } else if (cmd === 'ls') {
            printLine("FETCHING RECORDS FROM DATABASE...");
            if (!dataItems || dataItems.length === 0) {
                printLine("DATABASE_EMPTY: NO RECORDS FOUND.");
            } else {
                printLine("ID/NAME | DETAILS | STATUS");
                printLine("--------------------------------------");
                dataItems.forEach((item, index) => {
                    // Logic handles both Ticket format and Subscriber format
                    const name = item.Name || item.name;
                    const detail = item.EmailAddress || item.email;
                    const status = item.Status || (item.confirmed ? 'Confirmed' : 'Pending');
                    printLine(`[${index}] ${name} | ${detail} | ${status}`);
                });
            }
        } else if (cmd === 'clear') {
            output.innerHTML = 'SYSTEM REBOOT COMPLETE.';
        } else {
            printLine(`ERROR: COMMAND '${cmd}' NOT RECOGNIZED.`);
        }
        
        // Auto-scroll to bottom
        output.scrollTop = output.scrollHeight;
    }

    // Event Listener for Enter Key
    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const cmd = input.value.trim().toLowerCase();
            if (cmd) handleCommand(cmd);
            input.value = '';
        }
    });

    // TEMPORARY FOR TESTING (Delete this line next week once OAuth is live)
    // verifyAccess("primary-admin@gmail.com"); 
</script>
</body>
</html>
